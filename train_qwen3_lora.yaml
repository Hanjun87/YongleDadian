### model
model_name_or_path: models/Qwen3-8B
template: qwen

### method
stage: sft
do_train: true
finetuning_type: lora
lora_target: all
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.1

### dataset
dataset: train_full_complete
cutoff_len: 2048
max_samples: 100000
overwrite_cache: true
preprocessing_num_workers: 1

### output
output_dir: saves/qwen3-8b/lora/train
dataset_dir: .
logging_steps: 10
save_steps: 100
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 5.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
fp16: false
pure_bf16: false

### eval
val_size: 0.05
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 100
